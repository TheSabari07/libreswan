# /etc/ipsec.conf - Libreswan IPsec configuration file

version 2.0

config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	plutodebug=all
	dumpdir=/tmp
	dnssec-enable=no

conn base
	# road
	left=192.1.3.209
	leftid="@west"
	rightid="@east"
	leftsubnet=192.0.1.0/24
	rightsubnet=192.0.2.0/24
	authby=secret
	retransmit-interval=20s
	retransmit-timeout=10s

conn road-east
	also=base
	right=192.1.2.23
conn road-west
	also=base
	right=192.1.2.45

conn road-right
	also=base
	right=right.testing.libreswan.org
