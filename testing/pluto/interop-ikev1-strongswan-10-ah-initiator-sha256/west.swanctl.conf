connections {
	westnet-eastnet-ikev1 {
		include /tmp/swanctl/conf.d/ike_sa_default.conf
		#obsoleted option leftnexthop=192.1.2.23
		#=Right
		#obsoleted option rightnexthop=192.1.2.45
		version=1
		remote_addrs=192.1.2.23
		local_addrs=192.1.2.45
		proposals=aes256-sha1-modp2048, default
		children {
			westnet-eastnet-ikev1 {
				include /tmp/swanctl/conf.d/child_sa_default.conf
				start_action=none
				ah_proposals=sha256, default
				local_ts=192.0.1.0/24
				remote_ts=192.0.2.0/24
			}
			
		}
		local-0 {
			auth = psk
			id = @west
		}
		remote-0 {
			auth = psk
			id = @east
		}
	}
}
